<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文件管理 | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">EK</div>
        <div>
          <div class="brand-title">Admin Console</div>
          <div class="brand-sub">EK'S NEW LIFE</div>
        </div>
      </div>
      <nav class="menu">
        <a class="menu-item" href="admin.html">Dashboard 数据概览</a>
        <a class="menu-item" href="admin-users.html">用户管理</a>
        <a class="menu-item" href="admin-content.html">内容管理</a>
        <a class="menu-item" href="admin-products.html">产品管理</a>
        <a class="menu-item" href="admin-crm.html">客户管理</a>
        <a class="menu-item" href="admin-orders.html">订单管理</a>
        <a class="menu-item" href="admin-analytics.html">报表分析</a>
        <a class="menu-item active" href="admin-media.html">文件管理</a>
        <a class="menu-item" href="admin-i18n.html">多语言管理</a>
        <a class="menu-item" href="admin-forms.html">联系表单管理</a>
        <a class="menu-item" href="admin-settings.html">系统设置</a>
      </nav>
      <div class="sidebar-foot">
        <button class="ghost">新建文件夹</button>
        <button class="primary">上传文件</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">MEDIA / FILES</p>
          <h1>文件管理</h1>
          <p class="muted">图片、视频、文档统一管理。</p>
        </div>
        <div class="topbar-actions">
          <button class="ghost">批量操作</button>
          <button class="primary">上传文件</button>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-head"><h2>文件夹</h2><button class="ghost">管理</button></div>
          <div class="pill-group">
            <span>产品图片</span><span>证书</span><span>品牌素材</span><span>物流文件</span>
          </div>
          <p class="muted">支持拖拽与批量上传。</p>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>最近上传</h2><button class="ghost">查看</button></div>
          <div class="media-grid">
            <div class="media-card">IMG_2101.jpg</div>
            <div class="media-card">catalog.pdf</div>
            <div class="media-card">shipment.mp4</div>
            <div class="media-card">brand-kit.zip</div>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
