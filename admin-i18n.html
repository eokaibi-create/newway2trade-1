<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多语言管理 | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">EK</div>
        <div>
          <div class="brand-title">Admin Console</div>
          <div class="brand-sub">EK'S NEW LIFE</div>
        </div>
      </div>
      <nav class="menu">
        <a class="menu-item" href="admin.html">Dashboard 数据概览</a>
        <a class="menu-item" href="admin-users.html">用户管理</a>
        <a class="menu-item" href="admin-content.html">内容管理</a>
        <a class="menu-item" href="admin-products.html">产品管理</a>
        <a class="menu-item" href="admin-crm.html">客户管理</a>
        <a class="menu-item" href="admin-orders.html">订单管理</a>
        <a class="menu-item" href="admin-analytics.html">报表分析</a>
        <a class="menu-item" href="admin-media.html">文件管理</a>
        <a class="menu-item active" href="admin-i18n.html">多语言管理</a>
        <a class="menu-item" href="admin-forms.html">联系表单管理</a>
        <a class="menu-item" href="admin-settings.html">系统设置</a>
      </nav>
      <div class="sidebar-foot">
        <button class="ghost">同步翻译</button>
        <button class="primary">新增语言</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">MULTI-LANGUAGE</p>
          <h1>多语言管理</h1>
          <p class="muted">中文 / English / العربية 统一管理。</p>
        </div>
        <div class="topbar-actions">
          <button class="ghost">状态检查</button>
          <button class="primary">导出语言包</button>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-head"><h2>翻译状态</h2><button class="ghost">查看</button></div>
          <ul class="list">
            <li>中文：完成 100%</li>
            <li>English：完成 92%</li>
            <li>العربية：完成 78%</li>
          </ul>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>内容同步</h2><button class="ghost">同步</button></div>
          <ul class="list">
            <li>新产品自动生成翻译任务</li>
            <li>支持人工校对与审核</li>
            <li>语言切换实时生效</li>
          </ul>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>语言包</h2><button class="ghost">下载</button></div>
          <div class="table">
            <div class="table-row table-head"><span>模块</span><span>中文</span><span>英文</span></div>
            <div class="table-row"><span>首页</span><span class="tag">完成</span><span class="tag warn">待审核</span></div>
            <div class="table-row"><span>产品</span><span class="tag">完成</span><span class="tag">完成</span></div>
            <div class="table-row"><span>订单</span><span class="tag">完成</span><span class="tag warn">待审核</span></div>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
