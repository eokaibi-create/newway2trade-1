<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报表分析 | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">EK</div>
        <div>
          <div class="brand-title">Admin Console</div>
          <div class="brand-sub">EK'S NEW LIFE</div>
        </div>
      </div>
      <nav class="menu">
        <a class="menu-item" href="admin.html">Dashboard 数据概览</a>
        <a class="menu-item" href="admin-users.html">用户管理</a>
        <a class="menu-item" href="admin-content.html">内容管理</a>
        <a class="menu-item" href="admin-products.html">产品管理</a>
        <a class="menu-item" href="admin-crm.html">客户管理</a>
        <a class="menu-item" href="admin-orders.html">订单管理</a>
        <a class="menu-item active" href="admin-analytics.html">报表分析</a>
        <a class="menu-item" href="admin-media.html">文件管理</a>
        <a class="menu-item" href="admin-i18n.html">多语言管理</a>
        <a class="menu-item" href="admin-forms.html">联系表单管理</a>
        <a class="menu-item" href="admin-settings.html">系统设置</a>
      </nav>
      <div class="sidebar-foot">
        <button class="ghost">下载报表</button>
        <button class="primary">创建图表</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">ANALYTICS</p>
          <h1>报表分析</h1>
          <p class="muted">流量、产品、客户与订单统计。</p>
        </div>
        <div class="topbar-actions">
          <button class="ghost">选择时间</button>
          <button class="primary">生成报告</button>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-head"><h2>网站流量</h2><button class="ghost">查看</button></div>
          <div class="chart">流量趋势图（示意）</div>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>产品访问排行</h2><button class="ghost">查看</button></div>
          <ul class="list">
            <li>电子烟系列</li>
            <li>物流服务</li>
            <li>储物柜</li>
          </ul>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>客户来源</h2><button class="ghost">查看</button></div>
          <div class="chart">地区分布图（示意）</div>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>收入报表</h2><button class="ghost">查看</button></div>
          <div class="chart">收入趋势图（示意）</div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
