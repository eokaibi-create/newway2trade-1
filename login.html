<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login | EK'S NEW LIFE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="logo">EK</div>
        <div>
          <div class="brand-title">EK'S NEW LIFE</div>
          <div class="brand-sub">AL OKAIBI INTERNATIONAL TRADE SERVICES</div>
        </div>
      </div>

      <div class="login-header">
        <h1 data-i18n="login_title">客户登录</h1>
        <p data-i18n="login_subtitle">登录后查看价格与管理内容。</p>
      </div>

      <form id="loginForm" class="login-form">
        <label data-i18n="login_user_label">用户名</label>
        <input id="loginUser" type="email" data-i18n-placeholder="login_user_placeholder" placeholder="输入邮箱" />

        <label data-i18n="login_pass_label">密码</label>
        <input id="loginPass" type="password" data-i18n-placeholder="login_pass_placeholder" placeholder="输入密码" />

        <button class="btn primary" type="submit" data-i18n="login_button">登录</button>
        <p id="loginError" class="login-error" data-i18n="login_error">用户名或密码错误。</p>
        <p class="login-hint" data-i18n="login_hint">如需开通账户，请联系管理员。</p>
      </form>

      <div class="lang">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ar">AR</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
